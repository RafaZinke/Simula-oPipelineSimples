name: Pipeline Simples

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt || echo "Sem requirements"

  test:
    name: 🧪 Testes
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Rodar testes
        run: |
          echo "Simulando testes..."
          python -m unittest discover || echo "Sem testes ainda"

  deploy:
    name: 🚀 Deploy (Simulado)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy fake
        run: |
          echo "Fazendo deploy..."
          echo "Deploy realizado com sucesso!"
